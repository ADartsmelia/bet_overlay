<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Control</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap');

  :root {
    --bg:       #0a0b0d;
    --panel:    #111318;
    --border:   #1e2229;
    --accent:   #f0b429;
    --green:    #22c55e;
    --red:      #ef4444;
    --blue:     #3b82f6;
    --muted:    #4a5060;
    --text:     #e2e8f0;
    --subtext:  #6b7280;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 1fr;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }

  .logo {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .status-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--subtext);
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }

  .dot.up   { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.down { background: var(--red);   box-shadow: 0 0 6px var(--red); }

  /* ── Main grid ── */
  main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* ── Left panel ── */
  .controls {
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title .num {
    width: 22px; height: 22px;
    background: var(--accent);
    color: #000;
    border-radius: 3px;
    font-size: 13px;
    font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }

  .row-group { display: flex; flex-direction: column; gap: 10px; }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 80px;
    gap: 8px;
    align-items: center;
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--subtext);
    margin-bottom: 4px;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 8px 10px;
    outline: none;
    transition: border-color .2s;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 4px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s;
    margin-top: 16px;
  }

  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-generate {
    background: var(--accent);
    color: #000;
  }
  .btn-generate:hover:not(:disabled) { background: #fbbf24; }

  .btn-push {
    background: var(--green);
    color: #000;
  }
  .btn-push:hover:not(:disabled) { background: #16a34a; }

  .duration-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
  }

  .duration-row label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--subtext);
    white-space: nowrap;
  }

  .overlay-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--border);
    color: var(--subtext);
    transition: all .3s;
  }

  .overlay-badge.active {
    background: rgba(34,197,94,.15);
    color: var(--green);
    border: 1px solid rgba(34,197,94,.3);
  }

  .generated-path {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    margin-top: 8px;
    display: none;
    word-break: break-all;
  }

  /* ── Log panel ── */
  .log-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    flex-shrink: 0;
  }

  .log-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--subtext);
  }

  .log-clear {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 3px 10px;
    color: var(--subtext);
    font-family: var(--sans);
    transition: all .15s;
  }

  .log-clear:hover { border-color: var(--muted); color: var(--text); }

  #log-output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
  }

  #log-output::-webkit-scrollbar { width: 4px; }
  #log-output::-webkit-scrollbar-track { background: transparent; }
  #log-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-line { display: flex; gap: 10px; }

  .log-time { color: var(--muted); flex-shrink: 0; }

  .log-INFO    { color: var(--text); }
  .log-WARNING { color: var(--accent); }
  .log-ERROR   { color: var(--red); }
  .log-DEBUG   { color: var(--muted); }

  /* ── Footer ── */
  footer {
    padding: 10px 28px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .ws-status { display: flex; align-items: center; gap: 6px; }

  /* spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    display: none;
  }
  .spinner.active { display: inline-block; }
</style>
</head>
<body>

<header>
  <div class="logo">STREAM<span>CTL</span></div>
  <div class="status-bar">
    <div class="pill"><div class="dot" id="dot-ingest"></div> Ingest</div>
    <div class="pill"><div class="dot" id="dot-encoder"></div> Encoder</div>
    <div class="overlay-badge" id="overlay-badge"><div class="dot" id="dot-overlay"></div> Overlay</div>
  </div>
</header>

<main>
  <!-- ── Controls ── -->
  <div class="controls">

    <!-- Generate -->
    <div class="card">
      <div class="card-title"><span class="num">1</span> Generate Overlay</div>
      <div class="row-group">

        <div>
          <div class="field-label">Team 1 / Odd</div>
          <div class="field-row">
            <input type="text"   id="team1" value="PALACE">
            <input type="text"   id="odd1"  value="1.50">
          </div>
        </div>

        <div>
          <div class="field-label">Team 2 / Odd</div>
          <div class="field-row">
            <input type="text"   id="team2" value="ვრე">
            <input type="text"   id="odd2"  value="1.50">
          </div>
        </div>

        <div>
          <div class="field-label">Team 3 / Odd</div>
          <div class="field-row">
            <input type="text"   id="team3" value="RAYO VALLECANO">
            <input type="text"   id="odd3"  value="1.50">
          </div>
        </div>

      </div>

      <button class="btn btn-generate" id="btn-generate" onclick="generateOverlay()">
        <span class="spinner" id="spin-gen"></span>
        Generate MOV
      </button>
      <div class="generated-path" id="gen-path"></div>
    </div>

    <!-- Push -->
    <div class="card">
      <div class="card-title"><span class="num">2</span> Push to Stream</div>

      <div class="duration-row">
        <label>Duration (ms)</label>
        <input type="number" id="duration" value="15000" min="1000" max="120000" style="width:100px">
      </div>

      <button class="btn btn-push" id="btn-push" onclick="pushOverlay()">
        <span class="spinner" id="spin-push"></span>
        Push Overlay
      </button>
    </div>

  </div>

  <!-- ── Logs ── -->
  <div class="log-panel">
    <div class="log-header">
      <span class="log-title">Live Logs</span>
      <button class="log-clear" onclick="clearLogs()">Clear</button>
    </div>
    <div id="log-output"></div>
  </div>
</main>

<footer>
  <span>SRT IN: srt://5.178.129.17:12349 → OUT: srt://0.0.0.0:9003</span>
  <span class="ws-status"><div class="dot" id="dot-ws"></div> <span id="ws-label">connecting…</span></span>
</footer>

<script>
  const logEl = document.getElementById('log-output');
  let ws;

  function connectWS() {
    ws = new WebSocket(`ws://${location.host}/ws/logs`);

    ws.onopen = () => {
      document.getElementById('dot-ws').className = 'dot up';
      document.getElementById('ws-label').textContent = 'connected';
      appendLog({ msg: 'WebSocket connected', level: 'INFO' });
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      appendLog(data);
    };

    ws.onclose = () => {
      document.getElementById('dot-ws').className = 'dot down';
      document.getElementById('ws-label').textContent = 'reconnecting…';
      setTimeout(connectWS, 2000);
    };
  }

  function appendLog({ msg, level }) {
    const now = new Date().toTimeString().slice(0, 8);
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">${now}</span><span class="log-${level}">${escHtml(msg)}</span>`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function clearLogs() { logEl.innerHTML = ''; }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Status polling ────────────────────────────────────────────────────────

  async function pollStatus() {
    try {
      const r = await fetch('/status');
      const s = await r.json();
      document.getElementById('dot-ingest').className  = 'dot ' + (s.ingest  === 'running' ? 'up' : 'down');
      document.getElementById('dot-encoder').className = 'dot ' + (s.encoder === 'running' ? 'up' : 'down');
      const badge = document.getElementById('overlay-badge');
      const dotOv = document.getElementById('dot-overlay');
      if (s.overlay) {
        badge.className = 'overlay-badge active';
        dotOv.className = 'dot up';
      } else {
        badge.className = 'overlay-badge';
        dotOv.className = 'dot';
      }
    } catch {}
    setTimeout(pollStatus, 2000);
  }

  // ── Generate ──────────────────────────────────────────────────────────────

  async function generateOverlay() {
    const btn = document.getElementById('btn-generate');
    const spin = document.getElementById('spin-gen');
    btn.disabled = true;
    spin.classList.add('active');

    const body = {
      team1: document.getElementById('team1').value,
      team2: document.getElementById('team2').value,
      team3: document.getElementById('team3').value,
      odd1:  document.getElementById('odd1').value,
      odd2:  document.getElementById('odd2').value,
      odd3:  document.getElementById('odd3').value,
    };

    try {
      const r = await fetch('/overlay/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const d = await r.json();
      if (d.ok) {
        const el = document.getElementById('gen-path');
        el.textContent = '✓ ' + d.path;
        el.style.display = 'block';
      }
    } catch(e) {
      appendLog({ msg: 'Generate request failed: ' + e, level: 'ERROR' });
    } finally {
      btn.disabled = false;
      spin.classList.remove('active');
    }
  }

  // ── Push ──────────────────────────────────────────────────────────────────

  async function pushOverlay() {
    const btn  = document.getElementById('btn-push');
    const spin = document.getElementById('spin-push');
    const dur  = parseInt(document.getElementById('duration').value);
    btn.disabled = true;
    spin.classList.add('active');

    try {
      const r = await fetch('/overlay/push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ duration_ms: dur }),
      });
      const d = await r.json();
      if (!d.ok) {
        appendLog({ msg: 'Push failed: ' + d.error, level: 'ERROR' });
      }
    } catch(e) {
      appendLog({ msg: 'Push request failed: ' + e, level: 'ERROR' });
    } finally {
      // Re-enable after duration + buffer
      setTimeout(() => {
        btn.disabled = false;
        spin.classList.remove('active');
      }, dur + 500);
    }
  }

  connectWS();
  pollStatus();
</script>
</body>
</html>
